<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRI Globe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <h1 class="globe-caption">CRI EVENTS</h1>

    <div id="globe-wrap" aria-label="Interactive event globe">
      <canvas id="globe-canvas"></canvas>
    </div>

    <div class="event-modal" aria-hidden="true">
      <button class="event-backdrop" type="button" aria-label="Close"></button>
      <div class="event-card" role="dialog" aria-modal="true">
        <button class="event-close" type="button" aria-label="Close">&times;</button>
        <img class="event-photo" alt="" />
        <div class="event-text">
          <h3 class="event-name"></h3>
          <p class="event-desc"></p>
        </div>
      </div>
    </div>

    <script type="module" src="./src/globe.js"></script>
  </body>
</html>
